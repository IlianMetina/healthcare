<div class="card-container" (click)="onCardClick()">
    <div class="card-header">
        <div class="avatar-placeholder" aria-hidden="true">
            <span>{{patientInitials}}</span>
        </div>

        <div class="patient-meta">
            <p class="card-kicker">Patient</p>
            <h4 class="card-title">{{patient.firstName}} {{patient.lastName}}</h4>
        </div>
    </div>

    <div class="indicators-container">
        <div>
            <p class="label">Visites</p>
            <h3 class="card-number">14</h3>
        </div>

        <h4 class="card-percentage">+15%</h4>
    </div>

</div>
