<main class="main-home-container">
  <div class="welcome-banner">
    <div class="welcome-text">
      <h1>Bienvenue sur votre espace de travail</h1>
      <p>Retrouvez en un clin d'œil toutes les informations importantes de votre journée.</p>
    </div>
    <div class="welcome-actions">
      <button class="primary-btn" (click)="redirectToPatients()">
        <i class="ri-group-line"></i> Voir mes Patients
      </button>
    </div>
  </div>

  <div class="dashboard-grid">
    <div class="dashboard-card" (click)="redirectToPatients()">
      <div class="card-icon"><i class="ri-file-user-line"></i></div>
      <div class="card-info">
        <h3>Dossiers Patients</h3>
        <p>Gérez les fiches médicales et historiques</p>
      </div>
      <button class="card-btn"><i class="ri-arrow-right-line"></i></button>
    </div>
    
    <div class="dashboard-card">
      <div class="card-icon" style="background: #e0e7ff; color: #4f46e5;"><i class="ri-calendar-line"></i></div>
      <div class="card-info">
        <h3>Agenda & RDV</h3>
        <p>Consultez vos consultations du jour</p>
      </div>
      <button class="card-btn"><i class="ri-arrow-right-line"></i></button>
    </div>

    <div class="dashboard-card" (click)="redirectToAbout()">
      <div class="card-icon" style="background: #dcfce7; color: #16a34a;"><i class="ri-settings-4-line"></i></div>
      <div class="card-info">
        <h3>Paramètres</h3>
        <p>Configurez votre compte et clinique</p>
      </div>
      <button class="card-btn"><i class="ri-arrow-right-line"></i></button>
    </div>
  </div>
</main>
