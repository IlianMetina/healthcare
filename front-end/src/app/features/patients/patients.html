<div class="patients-layout">

  <!-- Left panel: patient list -->
  <div class="patient-list-panel">
    <div class="list-header">
      <span class="list-count">Patients — {{ filteredPatients.length }}</span>
      <button class="filter-btn">
        Filtrer <i class="ri-arrow-down-s-line"></i>
      </button>
    </div>
    @for (patient of patientsList(); track patient.id) {
      <app-patient-list-item
        [patient]="patient"
        [isSelected]="selectedPatient.id === patient.id"
        [statusConfig]="statusConfig"
        (selectPatient)="selectPatient($event)"
      ></app-patient-list-item>
    }
  </div>

  <!-- Center: patient detail -->
  <div class="patient-center">

    <!-- Patient header card -->
    <app-patient-detail
      [patient]="selectedPatient"
      [statusConfig]="statusConfig"
    ></app-patient-detail>

    <!-- Vitals grid -->
    <div class="vitals-grid">
      @for (vital of vitals; track vital.label) {
        <app-vital-card
          [icon]="vital.icon"
          [label]="vital.label"
          [value]="vital.value"
          [unit]="vital.unit"
          [trend]="vital.trend"
          [data]="vital.data"
          [color]="vital.color"
        ></app-vital-card>
      }
    </div>

    <!-- Medical records timeline -->
    <app-medical-timeline [records]="records"></app-medical-timeline>

  </div>

  <!-- Right panel: agenda + stats -->
  <div class="right-panel-wrapper">
    <app-right-panel [appointments]="appointments"></app-right-panel>
  </div>

</div>
